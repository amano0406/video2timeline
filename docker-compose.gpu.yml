services:
  worker:
    image: timeline-for-video-worker-gpu:${TIMELINE_FOR_VIDEO_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: docker/worker.gpu.Dockerfile
    gpus: all
    environment:
      TIMELINE_FOR_VIDEO_WORKER_FLAVOR: gpu
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
