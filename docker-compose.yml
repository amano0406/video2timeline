name: timelineforvideo

services:
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      TIMELINEFORVIDEO_RUNTIME_DEFAULTS: /app/config/runtime.defaults.json
      TIMELINEFORVIDEO_APPDATA_ROOT: /shared/app-data
      TIMELINEFORVIDEO_UPLOADS_ROOT: /shared/uploads
      TIMELINEFORVIDEO_OUTPUTS_ROOT: /shared/outputs
      TIMELINEFORVIDEO_HF_CACHE_ROOT: /cache/huggingface
      TIMELINEFORVIDEO_TORCH_CACHE_ROOT: /cache/torch
    ports:
      - "${TIMELINEFORVIDEO_WEB_PORT:-19200}:8080"
    volumes:
      - app-data:/shared/app-data
      - outputs:/shared/outputs
      - uploads:/shared/uploads
      - hf-cache:/cache/huggingface
      - torch-cache:/cache/torch
    depends_on:
      - worker

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    environment:
      TIMELINEFORVIDEO_RUNTIME_DEFAULTS: /app/config/runtime.defaults.json
      TIMELINEFORVIDEO_APPDATA_ROOT: /shared/app-data
      TIMELINEFORVIDEO_UPLOADS_ROOT: /shared/uploads
      TIMELINEFORVIDEO_OUTPUTS_ROOT: /shared/outputs
      HF_HOME: /cache/huggingface
      TRANSFORMERS_CACHE: /cache/huggingface
      TORCH_HOME: /cache/torch
    volumes:
      - app-data:/shared/app-data
      - outputs:/shared/outputs
      - uploads:/shared/uploads
      - hf-cache:/cache/huggingface
      - torch-cache:/cache/torch

volumes:
  app-data:
  outputs:
  uploads:
  hf-cache:
  torch-cache:
